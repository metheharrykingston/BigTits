<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Applicant Details - Income Certificate</title>
</head>
<body>
  <h1>Applicant Details</h1>
  <form>
    <label for="applicant_name">Applicant Name</label>
    <input id="applicant_name" name="applicant_name" type="text" required />

    <label for="father_name">Father's Name</label>
    <input id="father_name" name="father_name" type="text" />

    <label for="dob">Date of Birth</label>
    <input id="dob" name="dob" type="date" />

    <label for="mobile">Mobile Number</label>
    <input id="mobile" name="mobile" type="tel" />

    <label for="email">Email ID</label>
    <input id="email" name="email" type="email" />

    <label for="address">Residential Address</label>
    <textarea id="address" name="address"></textarea>

    <label for="district">District</label>
    <input id="district" name="district" type="text" />

    <label for="state">State/UT</label>
    <input id="state" name="state" type="text" />

    <label for="pincode">PIN Code</label>
    <input id="pincode" name="pincode" type="text" />

    <label for="purpose">Purpose of Certificate</label>
    <input id="purpose" name="purpose" type="text" />

    <label for="income">Annual Income</label>
    <input id="income" name="income" type="text" />

    <button type="button">Save and Continue</button>
  </form>
</body>
</html>
